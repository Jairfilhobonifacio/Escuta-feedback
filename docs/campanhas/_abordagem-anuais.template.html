<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Bizzu · Abordagem Anuais Ativos</title>

<!--
  ============================================================================
  PAINEL DE ABORDAGEM — CLIENTES DO PLANO ANUAL ATIVO (Bizzu / Escuta)
  ----------------------------------------------------------------------------
  Single-file, 100% offline (file://). Sem build, sem CDN, sem dependências.
  Para o JAIR abordar no WhatsApp os clientes anuais ativos.

  COMO PREENCHER OS DADOS:
    Um script Python injeta a lista real de clientes no lugar do marcador
    de clientes (logo abaixo de "window.CLIENTES = []"). NÃO remova o marcador.
    Rode: python scripts/export_anuais_ativos.py   (ou --demo)
  ============================================================================
-->

<script>
/* ===========================================================================
   CONTRATO DE DADOS — window.CLIENTES
   ---------------------------------------------------------------------------
   Lista preenchida pelo script Python. NÃO mexa no marcador da linha abaixo.
   Cada item (alguns campos podem vir "" ou null):
   {
     nome: "João",                    // primeiro nome
     nome_completo: "João Silva",
     email: "joao@exemplo.com",       // "" se ausente
     whatsapp: "5531999998888",       // só dígitos: DDI+DDD+numero

     plano: "Plano Anual",
     plan_type: "anual",
     estado: "active_paying",         // status interno
     metodo_pagamento: "credit_card", // "" se ausente

     cadastro_em: "12/03/2025",       // "DD/MM/AAAA" (ou ISO) OU ""
     assinante_desde: "15/07/2025",   // "DD/MM/AAAA" (ou ISO) OU ""
     dias_de_casa: 312,               // int OU null
     meses_de_casa: 10,               // int OU null

     renova_em: "15/07/2026",         // "DD/MM/AAAA" (ou ISO) OU null
     dias_para_renovar: 34,           // int OU null
     ultimo_pagamento: "15/07/2025",  // "DD/MM/AAAA" (ou ISO) OU ""
     total_pago: "R$ 120,00",         // string já formatada OU número OU ""

     nps_score: 9,                    // int OU null
     nps_comment: "Ótimo app!",       // "" se ausente
     nps_votou: true,                 // bool OU null
     nps_respondido_em: "20/04/2026", // "DD/MM/AAAA" (ou ISO) OU ""

     perfil: "ativo_fiel",            // ver PERFIS no JS
     objetivo_sugerido: "relacionamento" // chave de window.TEMPLATES
   }
   =========================================================================== */
window.CLIENTES = [];
/*__CLIENTES__*/

/* ===========================================================================
   TEMPLATES DAS MENSAGENS — fonte ÚNICA das mensagens.
   A mensagem final = "Oi {primeiro_nome}! " + variante escolhida (A/B/C),
   com os placeholders substituídos pelos valores do cliente. Se o valor for
   null/""/ausente, a frase/trecho é removido com elegância (sem {...} cru nem
   pontuação dobrada). Veja o motor "substituirPlaceholders" no JS.

   Placeholders suportados:
     {primeiro_nome} {meses_de_casa} {dias_para_renovar}
     {plano} {nps_score} {nps_comment} {novidade}
   ({novidade} default = "Raio-X da Prova".)
   =========================================================================== */
window.TEMPLATES = {
  relacionamento: {
    label: "Relacionamento / Check-in",
    emoji: "🤝",
    perfis: ["ativo_fiel", "embaixador", "ativo_promotor", "ativo_em_risco"],
    variantes: {
      A: "passando pra saber como tão indo seus estudos com o Bizzu nesses {meses_de_casa} meses com a gente 😊 tem rolado algo que eu possa levar pro time pra deixar tua rotina ainda melhor?",
      B: "tava aqui pensando em você 👋 nesse tempo de Bizzu, como tá sendo? pode falar o que tá bom e o que dá pra melhorar.",
      C: "faz um tempo que a gente não conversa e eu queria saber de você 😊 nos seus estudos agora, o que tá te ajudando mais e o que ainda falta?"
    }
  },
  nps: {
    label: "Coletar NPS",
    emoji: "📊",
    perfis: ["ativo_silencioso", "ativo_passivo", "ativo_recente"],
    variantes: {
      A: "queria muito saber como tá tua experiência com o Bizzu nesses {meses_de_casa} meses. De 0 a 10, o quanto você recomendaria o Bizzu pra um amigo concurseiro?",
      B: "tô passando só pra te ouvir de verdade 👀 De 0 a 10, o quanto você recomendaria o Bizzu pra um amigo que também estuda pra concurso?",
      C: "tua opinião pesa muito pra gente. De 0 a 10, o quanto você recomendaria o Bizzu pra um amigo concurseiro?"
    }
  },
  renovacao: {
    label: "Renovação anual",
    emoji: "🔁",
    perfis: ["todos"], // aplicável a todos quando dias_para_renovar <= 30
    variantes: {
      A: "fez quase um ano que você começou essa jornada com a gente 🎯 daqui a {dias_para_renovar} dias seu plano renova. bora pra mais um ciclo? me conta o que o Bizzu mais te ajudou a destravar até aqui.",
      B: "tá chegando a hora de renovar teu plano {plano} e eu queria saber em primeira mão: o que você quer conquistar nesse próximo ano com o Bizzu do teu lado? 📚",
      C: "esse ano de Bizzu rendeu, hein? 🙌 antes de seguirmos pro próximo, queria te ouvir: tem algo que tornaria tua rotina ainda melhor pra gente caprichar?"
    }
  },
  novidade: {
    label: "Novidade / feature",
    emoji: "✨",
    perfis: ["todos"],
    variantes: {
      A: "saiu novidade no Bizzu e eu já pensei em você 👀 acabamos de soltar o Raio-X da Prova, que mostra em ranking quais tópicos do teu edital mais caem. De 0 a 10, o quanto isso te ajudaria hoje?",
      B: "tem novidade fresquinha no Bizzu 🙌 agora dá pra filtrar questões reais por tópico, direto do que a banca cobra. De 0 a 10, o quanto isso te deixa com vontade de voltar a treinar?",
      C: "lançamos uma novidade no Bizzu e quis te avisar em primeira mão 👀 é o {novidade}, feito pra deixar teus estudos mais certeiros. De 0 a 10, o quanto isso te anima a dar uma olhada?"
    }
  }
};

/* Texto default para o placeholder {novidade} quando o cliente não tiver um. */
window.NOVIDADE_PADRAO = "Raio-X da Prova";
</script>

<style>
  /* =========================================================================
     IDENTIDADE VISUAL — Bizzu
     dark #09090B · indigo #6C5CE7 · gold #F5A623
     headings: Space Grotesk · corpo: Inter (apenas fallback do sistema, sem CDN)
     ========================================================================= */
  :root {
    --bg:        #09090B;
    --bg-2:      #111114;
    --surface:   #16161A;
    --surface-2: #1D1D22;
    --border:    #2A2A31;
    --indigo:    #6C5CE7;
    --indigo-soft: #8B7BF0;
    --gold:      #F5A623;
    --text:      #EDEDF0;
    --text-dim:  #9A9AA5;
    --text-faint:#6B6B76;
    --green:     #2ECC71;
    --red:       #FF6B6B;

    --radius:    14px;
    --radius-sm: 9px;
    --shadow:    0 8px 30px rgba(0,0,0,.45);

    --font-head: "Space Grotesk", "Inter", -apple-system, BlinkMacSystemFont,
                 "Segoe UI", Roboto, system-ui, sans-serif;
    --font-body: "Inter", -apple-system, BlinkMacSystemFont,
                 "Segoe UI", Roboto, system-ui, sans-serif;
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 15px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  h1, h2, h3, .brand, .obj-label {
    font-family: var(--font-head);
    letter-spacing: -0.01em;
  }

  a { color: var(--indigo-soft); }

  /* --------------------------------------------------------------------- */
  /* CABEÇALHO                                                              */
  /* --------------------------------------------------------------------- */
  .app-header {
    padding: 22px 24px 16px;
    border-bottom: 1px solid var(--border);
    background:
      radial-gradient(900px 200px at 0% 0%, rgba(108,92,231,.16), transparent 60%),
      var(--bg);
  }
  .brand-row {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-wrap: wrap;
  }
  .brand-logo {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--indigo), var(--gold));
    display: grid;
    place-items: center;
    font-family: var(--font-head);
    font-weight: 700;
    font-size: 20px;
    color: #0c0c0e;
    box-shadow: 0 4px 16px rgba(108,92,231,.4);
  }
  .brand {
    font-size: 20px;
    font-weight: 700;
    margin: 0;
  }
  .brand small {
    display: block;
    font-family: var(--font-body);
    font-weight: 400;
    font-size: 12.5px;
    color: var(--text-dim);
    letter-spacing: 0;
  }
  .header-badge {
    margin-left: auto;
    font-size: 12px;
    color: var(--gold);
    border: 1px solid rgba(245,166,35,.35);
    background: rgba(245,166,35,.08);
    padding: 5px 11px;
    border-radius: 999px;
    white-space: nowrap;
  }

  /* --------------------------------------------------------------------- */
  /* BARRA DE CONTROLES (sticky)                                           */
  /* --------------------------------------------------------------------- */
  .controls {
    position: sticky;
    top: 0;
    z-index: 50;
    background: rgba(9,9,11,.86);
    backdrop-filter: blur(10px);
    border-bottom: 1px solid var(--border);
    padding: 14px 24px;
  }
  .controls-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 14px 18px;
    align-items: flex-end;
  }
  .field {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }
  .field label {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: .06em;
    color: var(--text-faint);
    font-weight: 600;
  }
  select, input[type="text"], input[type="search"] {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 9px 11px;
    border-radius: var(--radius-sm);
    font-family: var(--font-body);
    font-size: 14px;
    outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  select:focus, input:focus {
    border-color: var(--indigo);
    box-shadow: 0 0 0 3px rgba(108,92,231,.22);
  }
  select { min-width: 188px; cursor: pointer; }
  #f-busca { min-width: 230px; }

  /* Chips de perfil (multi-seleção) */
  .perfil-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 7px;
  }
  .chip {
    user-select: none;
    cursor: pointer;
    font-size: 12.5px;
    padding: 6px 11px;
    border-radius: 999px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--text-dim);
    display: inline-flex;
    align-items: center;
    gap: 6px;
    transition: all .14s;
  }
  .chip .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--p-color, var(--text-faint));
  }
  .chip.active {
    color: var(--text);
    border-color: var(--p-color, var(--indigo));
    background: color-mix(in srgb, var(--p-color, var(--indigo)) 16%, transparent);
  }
  .chip input { display: none; }

  /* Checkbox "renova em <=30 dias" */
  .check-inline {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 13.5px;
    color: var(--text-dim);
    cursor: pointer;
    user-select: none;
    padding-bottom: 9px;
  }
  .check-inline input { width: 16px; height: 16px; accent-color: var(--indigo); cursor: pointer; }

  .counter {
    margin-left: auto;
    font-size: 13px;
    color: var(--text-dim);
    padding-bottom: 9px;
    white-space: nowrap;
    text-align: right;
    line-height: 1.4;
  }
  .counter b { color: var(--text); }
  .counter .done-count {
    display: block;
    font-size: 12px;
    color: var(--green);
  }
  .counter .done-count b { color: var(--green); }
  .counter .done-reset {
    cursor: pointer;
    color: var(--text-faint);
    text-decoration: underline;
    font-size: 11px;
    margin-left: 6px;
  }
  .counter .done-reset:hover { color: var(--red); }

  /* --------------------------------------------------------------------- */
  /* LISTA DE CARDS                                                         */
  /* --------------------------------------------------------------------- */
  .list {
    max-width: 1180px;
    margin: 0 auto;
    padding: 22px 24px 80px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 16px 16px 14px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    box-shadow: var(--shadow);
    transition: border-color .15s, transform .12s;
  }
  .card:hover { border-color: #3a3a44; }

  .card-top {
    display: flex;
    align-items: flex-start;
    gap: 10px;
  }
  .avatar {
    flex: 0 0 auto;
    width: 42px; height: 42px;
    border-radius: 11px;
    display: grid; place-items: center;
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 16px;
    color: #0c0c0e;
    background: var(--p-color, var(--indigo));
  }
  .card-id { min-width: 0; flex: 1; }
  .card-name {
    font-family: var(--font-head);
    font-weight: 600;
    font-size: 16px;
    margin: 0 0 4px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .selo {
    display: inline-block;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    color: var(--p-color, var(--text-dim));
    background: color-mix(in srgb, var(--p-color, var(--indigo)) 14%, transparent);
    border: 1px solid color-mix(in srgb, var(--p-color, var(--indigo)) 40%, transparent);
  }

  /* Meta (plano, meses, NPS, renovação) — sempre visível */
  .meta {
    display: flex;
    flex-wrap: wrap;
    gap: 6px 8px;
  }
  .pill {
    font-size: 12px;
    color: var(--text-dim);
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 4px 9px;
    display: inline-flex;
    align-items: center;
    gap: 5px;
  }
  .pill b { color: var(--text); font-weight: 600; }
  .pill.nps-hi    b { color: var(--green); }
  .pill.nps-mid   b { color: var(--gold); }
  .pill.nps-lo    b { color: var(--red); }
  .pill.renova    { border-color: rgba(245,166,35,.4); color: var(--gold); }
  .pill.renova.urgente {
    background: rgba(245,166,35,.12);
    color: var(--gold);
    border-color: rgba(245,166,35,.6);
  }

  /* --------------------------------------------------------------------- */
  /* FICHA DO CLIENTE                                                       */
  /* --------------------------------------------------------------------- */
  .ficha {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 7px 14px;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 12px;
  }
  .fr { display: flex; flex-direction: column; gap: 1px; min-width: 0; }
  .fr.full { grid-column: 1 / -1; }
  .fr .k {
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--text-faint);
    font-weight: 600;
  }
  .fr .v {
    font-size: 13px;
    color: var(--text);
    word-break: break-word;
  }
  .fr .v.dim { color: var(--text-dim); }

  /* Comentário do NPS em destaque (citação em itálico) */
  .nps-quote {
    margin: 0;
    padding: 9px 12px;
    border-left: 3px solid var(--gold);
    background: rgba(245,166,35,.07);
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    font-style: italic;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
  }
  .nps-quote .q-label {
    display: block;
    font-style: normal;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: .04em;
    color: var(--gold);
    font-weight: 600;
    margin-bottom: 3px;
  }

  /* <details> "ver ficha completa" (campos secundários) */
  details.ficha-extra {
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    background: var(--bg-2);
    overflow: hidden;
  }
  details.ficha-extra > summary {
    cursor: pointer;
    list-style: none;
    padding: 9px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text-dim);
    display: flex;
    align-items: center;
    gap: 7px;
    user-select: none;
    transition: color .14s;
  }
  details.ficha-extra > summary:hover { color: var(--text); }
  details.ficha-extra > summary::-webkit-details-marker { display: none; }
  details.ficha-extra > summary::before {
    content: "▸";
    color: var(--indigo-soft);
    font-size: 11px;
    transition: transform .15s;
  }
  details.ficha-extra[open] > summary::before { transform: rotate(90deg); }
  details.ficha-extra .ficha {
    border: 0;
    border-top: 1px solid var(--border);
    border-radius: 0;
    background: transparent;
  }

  /* Bloco da mensagem montada */
  .msg-wrap { display: flex; flex-direction: column; gap: 8px; }
  .msg-head {
    display: flex; align-items: center; gap: 6px;
    font-size: 11px; color: var(--text-faint);
    text-transform: uppercase; letter-spacing: .05em; font-weight: 600;
  }
  .msg-head .tag {
    color: var(--indigo-soft);
    background: rgba(108,92,231,.12);
    border: 1px solid rgba(108,92,231,.3);
    border-radius: 6px;
    padding: 1px 7px;
    text-transform: none;
    letter-spacing: 0;
    font-size: 11px;
  }
  textarea.msg {
    width: 100%;
    min-height: 112px;
    resize: vertical;
    background: var(--bg-2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--indigo);
    border-radius: var(--radius-sm);
    color: var(--text);
    padding: 11px 12px;
    font-family: var(--font-body);
    font-size: 13.5px;
    line-height: 1.55;
    outline: none;
    transition: border-color .15s;
  }
  textarea.msg:focus { border-color: var(--indigo); box-shadow: 0 0 0 3px rgba(108,92,231,.18); }

  /* Botões */
  .card-actions { display: flex; gap: 9px; }
  .btn {
    flex: 1;
    cursor: pointer;
    border: 1px solid var(--border);
    background: var(--surface-2);
    color: var(--text);
    font-family: var(--font-body);
    font-size: 13.5px;
    font-weight: 600;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: all .14s;
  }
  .btn:hover { border-color: #44444f; transform: translateY(-1px); }
  .btn:active { transform: translateY(0); }
  .btn-copy.ok { border-color: var(--green); color: var(--green); }
  .btn-wa {
    background: linear-gradient(135deg, var(--indigo), var(--indigo-soft));
    border-color: transparent;
    color: #fff;
  }
  .btn-wa:hover { filter: brightness(1.08); }
  .btn[disabled] { opacity: .45; cursor: not-allowed; transform: none; }

  /* Botão "já contatei" (toggle, ocupa a largura toda abaixo dos outros) */
  .card-foot { margin-top: 2px; }
  .btn-done {
    width: 100%;
    cursor: pointer;
    border: 1px dashed var(--border);
    background: transparent;
    color: var(--text-dim);
    font-family: var(--font-body);
    font-size: 13px;
    font-weight: 600;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 7px;
    transition: all .14s;
  }
  .btn-done:hover { border-color: var(--green); color: var(--green); }
  .btn-done.is-done {
    border-style: solid;
    border-color: rgba(46,204,113,.5);
    background: rgba(46,204,113,.1);
    color: var(--green);
  }

  /* Card esmaecido quando já contatado + faixa "contatado" no topo */
  .card.contatado { opacity: .52; }
  .card.contatado:hover { opacity: .78; }
  .badge-contatado {
    display: none;
    align-self: flex-start;
    font-size: 11px;
    font-weight: 600;
    padding: 3px 9px;
    border-radius: 999px;
    color: var(--green);
    background: rgba(46,204,113,.12);
    border: 1px solid rgba(46,204,113,.4);
    white-space: nowrap;
  }
  .card.contatado .badge-contatado { display: inline-block; }

  /* --------------------------------------------------------------------- */
  /* ESTADO VAZIO                                                           */
  /* --------------------------------------------------------------------- */
  .empty {
    grid-column: 1 / -1;
    text-align: center;
    padding: 70px 20px;
    color: var(--text-dim);
  }
  .empty .ico { font-size: 46px; margin-bottom: 14px; opacity: .8; }
  .empty h2 { font-size: 19px; color: var(--text); margin: 0 0 8px; }
  .empty code {
    background: var(--surface-2);
    border: 1px solid var(--border);
    padding: 3px 8px;
    border-radius: 6px;
    font-size: 13px;
    color: var(--gold);
  }

  /* --------------------------------------------------------------------- */
  /* RODAPÉ LGPD (fixo)                                                     */
  /* --------------------------------------------------------------------- */
  .lgpd {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    z-index: 60;
    background: rgba(9,9,11,.92);
    backdrop-filter: blur(8px);
    border-top: 1px solid var(--border);
    padding: 9px 20px;
    font-size: 12.5px;
    color: var(--text-dim);
    text-align: center;
  }
  .lgpd b { color: var(--gold); }

  ::selection { background: rgba(108,92,231,.35); }

  @media (max-width: 560px) {
    .list { grid-template-columns: 1fr; padding-left: 14px; padding-right: 14px; }
    .controls, .app-header { padding-left: 14px; padding-right: 14px; }
    select, #f-busca { min-width: 0; width: 100%; }
    .field { flex: 1 1 100%; }
    .ficha { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

  <!-- ===================== CABEÇALHO ===================== -->
  <header class="app-header">
    <div class="brand-row">
      <div class="brand-logo">B</div>
      <h1 class="brand">Abordagem · Anuais Ativos
        <small>Bizzu — clientes do plano anual para o JAIR abordar no WhatsApp</small>
      </h1>
      <span class="header-badge">Painel local · offline</span>
    </div>
  </header>

  <!-- ===================== CONTROLES (sticky) ===================== -->
  <section class="controls">
    <div class="controls-grid">

      <div class="field">
        <label for="f-objetivo">Objetivo da campanha</label>
        <select id="f-objetivo">
          <option value="__auto__">Sugerido (automático)</option>
          <option value="relacionamento">🤝 Relacionamento / Check-in</option>
          <option value="nps">📊 Coletar NPS</option>
          <option value="renovacao">🔁 Renovação anual</option>
          <option value="novidade">✨ Novidade / feature</option>
        </select>
      </div>

      <div class="field">
        <label for="f-variante">Variante</label>
        <select id="f-variante">
          <option value="A">Variante A</option>
          <option value="B">Variante B</option>
          <option value="C">Variante C</option>
        </select>
      </div>

      <div class="field">
        <label for="f-ordenar">Ordenar por</label>
        <select id="f-ordenar">
          <option value="prioridade">⚡ Prioridade (sugerida)</option>
          <option value="renova_asc">Renova antes</option>
          <option value="nps_asc">Menor NPS</option>
          <option value="casa_desc">Mais tempo de casa</option>
        </select>
      </div>

      <div class="field">
        <label for="f-objetivo-filtro">Filtrar por objetivo</label>
        <select id="f-objetivo-filtro">
          <option value="__todos__">Todos os objetivos</option>
          <option value="renovacao">🔁 Renovação</option>
          <option value="nps">📊 NPS</option>
          <option value="relacionamento">🤝 Relacionamento</option>
        </select>
      </div>

      <div class="field">
        <label for="f-busca">Buscar por nome ou e-mail</label>
        <input type="search" id="f-busca" placeholder="Ex.: João, maria@email.com…" autocomplete="off" />
      </div>

      <div class="field">
        <label>Perfil</label>
        <div class="perfil-chips" id="f-perfis"><!-- chips gerados via JS --></div>
      </div>

      <label class="check-inline" for="f-renova30">
        <input type="checkbox" id="f-renova30" />
        Só quem renova em ≤30 dias
      </label>

      <label class="check-inline" for="f-ocultar-feitos">
        <input type="checkbox" id="f-ocultar-feitos" />
        Ocultar já contatados
      </label>

      <div class="counter" id="counter">
        <span id="counter-vis">Mostrando <b>0</b> de <b>0</b> clientes</span>
        <span class="done-count" id="counter-done"></span>
      </div>
    </div>
  </section>

  <!-- ===================== LISTA ===================== -->
  <main class="list" id="lista"><!-- cards gerados via JS --></main>

  <!-- ===================== RODAPÉ LGPD ===================== -->
  <footer class="lgpd">
    🔒 <b>Dados locais.</b> Só abordar quem tem opt-in de WhatsApp. Respeite o cooldown de 7 dias.
  </footer>

<script>
/* ===========================================================================
   LÓGICA DA PÁGINA — vanilla JS
   =========================================================================== */
(function () {
  "use strict";

  var CLIENTES  = Array.isArray(window.CLIENTES) ? window.CLIENTES : [];
  var TEMPLATES = window.TEMPLATES || {};
  var NOVIDADE_PADRAO = window.NOVIDADE_PADRAO || "uma novidade";

  /* ---- Metadados dos perfis: rótulo amigável + cor do selo --------------- */
  var PERFIS = {
    ativo_fiel:      { label: "Ativo fiel",       cor: "#6C5CE7" },
    embaixador:      { label: "Embaixador",       cor: "#F5A623" },
    ativo_promotor:  { label: "Ativo promotor",   cor: "#2ECC71" },
    ativo_silencioso:{ label: "Ativo silencioso", cor: "#7E8AA0" },
    ativo_passivo:   { label: "Ativo passivo",    cor: "#56C2D6" },
    ativo_recente:   { label: "Ativo recente",    cor: "#C792EA" },
    ativo_em_risco:  { label: "Ativo em risco",   cor: "#FF6B6B" }
  };
  function perfilMeta(p) {
    return PERFIS[p] || { label: p || "—", cor: "#6B6B76" };
  }

  /* ---- Elementos --------------------------------------------------------- */
  var el = {
    objetivo:    document.getElementById("f-objetivo"),
    variante:    document.getElementById("f-variante"),
    ordenar:     document.getElementById("f-ordenar"),
    objFiltro:   document.getElementById("f-objetivo-filtro"),
    busca:       document.getElementById("f-busca"),
    perfis:      document.getElementById("f-perfis"),
    renova30:    document.getElementById("f-renova30"),
    ocultarDone: document.getElementById("f-ocultar-feitos"),
    counterVis:  document.getElementById("counter-vis"),
    counterDone: document.getElementById("counter-done"),
    lista:       document.getElementById("lista")
  };

  /* ---- Estado dos filtros ------------------------------------------------ */
  var perfisSelecionados = new Set(); // vazio = todos

  /* ===========================================================================
     "JÁ CONTATEI" — persistência em localStorage
     ---------------------------------------------------------------------------
     Chave estável por cliente: whatsapp (só dígitos) > e-mail (lower) > id. Assim
     o estado sobrevive à regeneração do HTML (mesmo cliente = mesma chave) e não
     vaza entre clientes. Guardamos só as CHAVES dos contatados (Set serializado),
     nunca nome/mensagem. Tudo local (file://), some se o Jair limpar o navegador.
     =========================================================================== */
  var LS_KEY = "escuta:anuais:contatados:v1";
  var contatados = carregarContatados();

  function chaveCliente(c) {
    var w = String(c && c.whatsapp != null ? c.whatsapp : "").replace(/\D/g, "");
    if (w) return "w:" + w;
    var e = String(c && c.email != null ? c.email : "").trim().toLowerCase();
    if (e) return "e:" + e;
    var id = String(c && c.id != null ? c.id : "").trim();
    if (id) return "i:" + id;
    return ""; // sem âncora estável: não persiste (evita colidir clientes diferentes)
  }

  function carregarContatados() {
    try {
      var raw = window.localStorage.getItem(LS_KEY);
      var arr = raw ? JSON.parse(raw) : [];
      return new Set(Array.isArray(arr) ? arr : []);
    } catch (e) {
      return new Set(); // localStorage indisponível (file:// restrito) -> só memória
    }
  }
  function salvarContatados() {
    try {
      window.localStorage.setItem(LS_KEY, JSON.stringify(Array.from(contatados)));
    } catch (e) { /* sem persistência: segue só em memória nesta sessão */ }
  }
  function estaContatado(c) {
    var k = chaveCliente(c);
    return k ? contatados.has(k) : false;
  }
  function alternarContatado(c) {
    var k = chaveCliente(c);
    if (!k) return false; // sem chave estável: não dá pra marcar de forma confiável
    if (contatados.has(k)) contatados.delete(k);
    else contatados.add(k);
    salvarContatados();
    return contatados.has(k);
  }
  // quantos dos clientes carregados (que têm chave) já foram contatados
  function totalContatados() {
    var n = 0;
    CLIENTES.forEach(function (c) { if (estaContatado(c)) n++; });
    return n;
  }
  function limparContatados() {
    contatados.clear();
    salvarContatados();
    render();
  }

  /* ===========================================================================
     HELPERS DE VALOR
     =========================================================================== */
  // "vazio" = null, undefined ou string só com espaços
  function vazio(v) {
    return v == null || (typeof v === "string" && v.trim() === "");
  }
  function primeiroNome(c) {
    if (!vazio(c.nome)) return String(c.nome).trim();
    if (!vazio(c.nome_completo)) return String(c.nome_completo).trim().split(/\s+/)[0];
    return "";
  }

  /* ===========================================================================
     MOTOR DE SUBSTITUIÇÃO DE PLACEHOLDERS
     ---------------------------------------------------------------------------
     Troca {placeholder} pelo valor do cliente. Se o valor estiver
     vazio/ausente, o placeholder vira um marcador-fantasma (GHOST) e a FRASE
     inteira que o contém é removida — sem deixar "{...}" cru nem pontuação
     dobrada. GHOST é um token ASCII improvável de aparecer nos textos.
     =========================================================================== */
  var GHOST = "@@GHOST@@"; // marcador-fantasma interno (placeholder sem valor)

  function valorPlaceholder(nome, c) {
    switch (nome) {
      case "primeiro_nome":     return primeiroNome(c);
      case "meses_de_casa":     return vazio(c.meses_de_casa) ? null : String(c.meses_de_casa);
      case "dias_para_renovar": return vazio(c.dias_para_renovar) ? null : String(c.dias_para_renovar);
      case "plano":             return vazio(c.plano) ? null : String(c.plano).trim();
      case "nps_score":         return vazio(c.nps_score) ? null : String(c.nps_score);
      case "nps_comment":       return vazio(c.nps_comment) ? null : String(c.nps_comment).trim();
      case "novidade":          return (!vazio(c.novidade) ? String(c.novidade).trim() : NOVIDADE_PADRAO);
      default:                  return null; // placeholder desconhecido -> remove a frase
    }
  }

  // 1a passada: troca cada {ph} pelo valor; sem valor -> insere o GHOST.
  function aplicarValores(texto, c) {
    return texto.replace(/\{([a-z_]+)\}/g, function (_m, nome) {
      var v = valorPlaceholder(nome, c);
      return (v == null || v === "") ? GHOST : v;
    });
  }

  // 2a passada: remove as frases que contêm o GHOST e faz a faxina.
  function limparFrasesFantasma(texto) {
    if (texto.indexOf(GHOST) === -1) return faxinaPontuacao(texto);

    // quebra em frases preservando a pontuação forte (. ! ?)
    var partes = texto.split(/(?<=[.!?])\s+/);
    var mantidas = partes.filter(function (frase) {
      return frase.indexOf(GHOST) === -1;
    });
    var out = mantidas.join(" ");
    // fallback: se tudo caiu, remove só o GHOST do texto original
    if (out.trim() === "") out = texto.split(GHOST).join("");
    return faxinaPontuacao(out);
  }

  // remove GHOST residual, pontuação/espaço dobrado e espaço antes de pontuação
  function faxinaPontuacao(s) {
    return String(s)
      .split(GHOST).join("")           // garante zero marcadores residuais
      .replace(/\s+([,.;:!?])/g, "$1") // espaço antes de pontuação
      .replace(/([,;:])\1+/g, "$1")    // vírgulas/; duplicados
      .replace(/[ \t]{2,}/g, " ")      // espaços duplos
      .replace(/\s{2,}/g, " ")
      .trim();
  }

  function substituirPlaceholders(texto, c) {
    return limparFrasesFantasma(aplicarValores(texto, c));
  }

  /* ===========================================================================
     MONTAGEM DA MENSAGEM
     - objetivo "__auto__" usa o objetivo_sugerido do cliente
     - a saudação "Oi {primeiro_nome}! " também passa pelo motor
     =========================================================================== */
  function objetivoDoCliente(c) {
    var val = el.objetivo.value;
    if (val === "__auto__") {
      var sug = c.objetivo_sugerido;
      return (sug && TEMPLATES[sug]) ? sug : "relacionamento";
    }
    return val;
  }

  function montarMensagem(c) {
    var obj = objetivoDoCliente(c);
    var bloco = TEMPLATES[obj];
    var variante = el.variante.value;

    var corpo = "";
    if (bloco && bloco.variantes) {
      corpo = bloco.variantes[variante] || bloco.variantes.A || "";
    }

    // saudação + corpo, tudo pelo mesmo motor de placeholders
    var bruto = "Oi {primeiro_nome}! " + corpo;
    var msg = substituirPlaceholders(bruto, c);

    // se por acaso o nome sumiu, garante uma saudação mínima
    if (!/^Oi\b/.test(msg)) msg = "Oi! " + msg;
    return msg;
  }

  /* ===========================================================================
     FILTRAGEM
     =========================================================================== */
  function clienteVisivel(c) {
    // busca por nome / nome_completo / e-mail
    var termo = (el.busca.value || "").trim().toLowerCase();
    if (termo) {
      var alvo = ((c.nome || "") + " " + (c.nome_completo || "") + " " + (c.email || "")).toLowerCase();
      if (alvo.indexOf(termo) === -1) return false;
    }
    // perfil (multi)
    if (perfisSelecionados.size > 0 && !perfisSelecionados.has(c.perfil)) return false;
    // filtro por objetivo_sugerido (renovacao / nps / relacionamento)
    var objFil = el.objFiltro ? el.objFiltro.value : "__todos__";
    if (objFil && objFil !== "__todos__" && c.objetivo_sugerido !== objFil) return false;
    // renova em <=30 dias
    if (el.renova30.checked) {
      if (vazio(c.dias_para_renovar) || Number(c.dias_para_renovar) > 30) return false;
    }
    // ocultar já contatados
    if (el.ocultarDone && el.ocultarDone.checked && estaContatado(c)) return false;
    return true;
  }

  /* ===========================================================================
     ORDENAÇÃO — valores ausentes vão sempre para o fim
     =========================================================================== */
  // "score" de prioridade: MENOR = mais urgente (vai pro topo). Combina sinais de
  // negócio: em risco > perto de renovar > NPS baixo > objetivo. Empata pelo nº
  // de dias p/ renovar (quem renova antes sobe).
  function scorePrioridade(c) {
    var s = 1000;
    if (c.perfil === "ativo_em_risco") s -= 600;            // risco de churn = topo
    var dr = vazio(c.dias_para_renovar) ? null : Number(c.dias_para_renovar);
    if (dr !== null && dr <= 30) s -= 400;                  // janela de renovação
    else if (dr !== null && dr <= 60) s -= 150;             // renovação se aproximando
    if (!vazio(c.nps_score) && Number(c.nps_score) <= 6) s -= 200; // detrator
    // objetivo sugerido como desempate de importância
    if (c.objetivo_sugerido === "renovacao") s -= 80;
    else if (c.objetivo_sugerido === "nps") s -= 40;
    return s;
  }

  function ordenar(lista) {
    var modo = el.ordenar ? el.ordenar.value : "prioridade";
    var arr = lista.slice();
    var FIM = Number.POSITIVE_INFINITY;

    arr.sort(function (a, b) {
      // Em QUALQUER modo, já-contatado desce para o fim do seu bloco (worklist).
      var da = estaContatado(a) ? 1 : 0;
      var db = estaContatado(b) ? 1 : 0;
      if (da !== db) return da - db;

      if (modo === "prioridade") {
        var pa = scorePrioridade(a);
        var pb = scorePrioridade(b);
        if (pa !== pb) return pa - pb; // menor score = mais urgente primeiro
        // desempate: renova antes primeiro
        var qa = vazio(a.dias_para_renovar) ? FIM : Number(a.dias_para_renovar);
        var qb = vazio(b.dias_para_renovar) ? FIM : Number(b.dias_para_renovar);
        return qa - qb;
      }
      if (modo === "nps_asc") {
        var na = vazio(a.nps_score) ? FIM : Number(a.nps_score);
        var nb = vazio(b.nps_score) ? FIM : Number(b.nps_score);
        return na - nb; // menor NPS primeiro
      }
      if (modo === "renova_asc") {
        var ra = vazio(a.dias_para_renovar) ? FIM : Number(a.dias_para_renovar);
        var rb = vazio(b.dias_para_renovar) ? FIM : Number(b.dias_para_renovar);
        return ra - rb; // renova antes primeiro
      }
      // casa_desc: mais tempo de casa primeiro
      var ca = vazio(a.dias_de_casa) ? -1 : Number(a.dias_de_casa);
      var cb = vazio(b.dias_de_casa) ? -1 : Number(b.dias_de_casa);
      return cb - ca;
    });
    return arr;
  }

  /* ===========================================================================
     HELPERS DE FORMATAÇÃO
     =========================================================================== */
  function iniciais(c) {
    var base = c.nome_completo || c.nome || "?";
    var parts = String(base).trim().split(/\s+/);
    var s = (parts[0] || "")[0] || "";
    if (parts.length > 1) s += (parts[parts.length - 1] || "")[0] || "";
    return s.toUpperCase();
  }
  function classeNps(n) {
    if (vazio(n)) return "";
    n = Number(n);
    if (n >= 9) return "nps-hi";
    if (n >= 7) return "nps-mid";
    return "nps-lo";
  }
  function escapeHtml(s) {
    return String(s == null ? "" : s)
      .replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;").replace(/'/g, "&#39;");
  }
  // aceita "DD/MM/AAAA" (já formatado pelo Python) OU ISO "AAAA-MM-DD"
  function fmtData(d) {
    if (vazio(d)) return "";
    var s = String(d).trim();
    var iso = /^(\d{4})-(\d{2})-(\d{2})/.exec(s);
    if (iso) return iso[3] + "/" + iso[2] + "/" + iso[1]; // -> DD/MM/AAAA
    return s; // já vem "DD/MM/AAAA" ou outro formato: repassa
  }
  // aceita string já formatada ("R$ 120,00") OU número
  function fmtDinheiro(v) {
    if (vazio(v)) return "";
    if (typeof v === "number") {
      return "R$ " + v.toLocaleString("pt-BR", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }
    return String(v).trim();
  }

  /* ===========================================================================
     FICHA — monta linhas rótulo/valor, pulando campos vazios
     =========================================================================== */
  // monta uma linha "rótulo/valor"; retorna "" se valor vazio (não aparece)
  function linha(rotulo, valor, opts) {
    if (vazio(valor)) return "";
    var cls  = (opts && opts.dim)  ? " dim"  : "";
    var full = (opts && opts.full) ? " full" : "";
    return '<div class="fr' + full + '">' +
             '<span class="k">' + escapeHtml(rotulo) + '</span>' +
             '<span class="v' + cls + '">' + escapeHtml(valor) + '</span>' +
           '</div>';
  }

  // texto resumido do NPS p/ ficha (score + votou? + respondido em)
  function npsTextoFicha(c) {
    if (vazio(c.nps_score) && vazio(c.nps_votou) && vazio(c.nps_respondido_em)) return "";
    var partes = [];
    if (!vazio(c.nps_score)) partes.push(String(c.nps_score) + "/10");
    if (!vazio(c.nps_votou)) partes.push(c.nps_votou ? "votou" : "não votou");
    else if (!vazio(c.nps_score)) partes.push("votou");
    var quando = fmtData(c.nps_respondido_em);
    if (quando) partes.push("em " + quando);
    return partes.join(" · ");
  }

  // grid de pares rótulo/valor (lista de HTML de linhas já filtradas)
  function gridFicha(linhasHtml) {
    var corpo = linhasHtml.filter(Boolean).join("");
    if (!corpo) return "";
    return '<div class="ficha">' + corpo + '</div>';
  }

  // adiciona nós a um pai a partir de uma string HTML
  function appendHtml(parent, html) {
    if (!html) return;
    var holder = document.createElement("div");
    holder.innerHTML = html;
    while (holder.firstChild) parent.appendChild(holder.firstChild);
  }

  /* ===========================================================================
     RENDER DE UM CARD
     =========================================================================== */
  function criarCard(c) {
    var pm  = perfilMeta(c.perfil);
    var msg = montarMensagem(c);
    var obj = objetivoDoCliente(c);
    var tmpl = TEMPLATES[obj] || {};

    var card = document.createElement("article");
    card.className = "card" + (estaContatado(c) ? " contatado" : "");
    card.style.setProperty("--p-color", pm.cor);

    /* --- topo: avatar + nome completo + selo de perfil (+ badge contatado) --- */
    var top = document.createElement("div");
    top.className = "card-top";
    top.innerHTML =
      '<div class="avatar">' + escapeHtml(iniciais(c)) + '</div>' +
      '<div class="card-id">' +
        '<p class="card-name">' + escapeHtml(c.nome_completo || c.nome || "—") + '</p>' +
        '<span class="selo">' + escapeHtml(pm.label) + '</span>' +
      '</div>' +
      '<span class="badge-contatado">✅ contatado</span>';
    card.appendChild(top);

    /* --- meta sempre visível: plano, meses de casa, NPS, renovação --- */
    var metaHtml = "";
    if (!vazio(c.plano)) metaHtml += '<span class="pill">📦 <b>' + escapeHtml(c.plano) + '</b></span>';
    if (!vazio(c.meses_de_casa)) {
      var titDias = !vazio(c.dias_de_casa) ? ' title="' + escapeHtml(c.dias_de_casa + " dias de casa") + '"' : "";
      metaHtml += '<span class="pill"' + titDias + '>🗓️ <b>' + escapeHtml(c.meses_de_casa) + '</b> meses de casa</span>';
    }
    if (!vazio(c.nps_score)) metaHtml += '<span class="pill ' + classeNps(c.nps_score) + '">NPS <b>' + escapeHtml(c.nps_score) + '</b></span>';
    if (!vazio(c.renova_em) || !vazio(c.dias_para_renovar)) {
      var urgente = (!vazio(c.dias_para_renovar) && Number(c.dias_para_renovar) <= 30) ? " urgente" : "";
      var quando  = !vazio(c.renova_em) ? fmtData(c.renova_em) : "";
      var faltam  = (!vazio(c.dias_para_renovar)) ? " · faltam " + c.dias_para_renovar + " dias" : "";
      metaHtml += '<span class="pill renova' + urgente + '">🔁 renova ' + escapeHtml(quando + faltam) + '</span>';
    }
    if (metaHtml) {
      var meta = document.createElement("div");
      meta.className = "meta";
      meta.innerHTML = metaHtml;
      card.appendChild(meta);
    }

    /* --- FICHA PRINCIPAL (sempre visível): e-mail, plano, NPS resumido --- */
    appendHtml(card, gridFicha([
      linha("E-mail", c.email, { full: true }),
      linha("Plano", c.plano),
      linha("NPS", npsTextoFicha(c))
    ]));

    /* --- comentário do NPS em destaque (citação), se houver --- */
    if (!vazio(c.nps_comment)) {
      appendHtml(card,
        '<div class="nps-quote">' +
          '<span class="q-label">💬 comentário do NPS' +
            (!vazio(c.nps_score) ? ' · nota ' + escapeHtml(c.nps_score) : "") + '</span>' +
          '“' + escapeHtml(String(c.nps_comment).trim()) + '”' +
        '</div>');
    }

    /* --- FICHA SECUNDÁRIA (colapsável): pgto, total, estado, datas --- */
    var secundaria = [
      linha("Método de pagamento", c.metodo_pagamento),
      linha("Total pago", fmtDinheiro(c.total_pago)),
      linha("Estado", c.estado),
      linha("Cadastro em", fmtData(c.cadastro_em)),
      linha("Assinante desde", fmtData(c.assinante_desde)),
      linha("Tempo de casa", !vazio(c.dias_de_casa) ? (c.dias_de_casa + " dias") : ""),
      linha("Renova em", fmtData(c.renova_em)),
      linha("Último pagamento", fmtData(c.ultimo_pagamento)),
      linha("NPS respondido em", fmtData(c.nps_respondido_em)),
      linha("WhatsApp", c.whatsapp, { dim: true })
    ].filter(Boolean);

    if (secundaria.length > 0) {
      var det = document.createElement("details");
      det.className = "ficha-extra";
      det.innerHTML =
        '<summary>Ver ficha completa</summary>' +
        '<div class="ficha">' + secundaria.join("") + '</div>';
      card.appendChild(det);
    }

    /* --- bloco da mensagem (editável) --- */
    var wrap = document.createElement("div");
    wrap.className = "msg-wrap";

    var head = document.createElement("div");
    head.className = "msg-head";
    head.innerHTML = 'Mensagem · <span class="tag">' +
      (tmpl.emoji ? tmpl.emoji + " " : "") + escapeHtml(tmpl.label || obj) +
      ' · ' + escapeHtml(el.variante.value) + '</span>';
    wrap.appendChild(head);

    var ta = document.createElement("textarea");
    ta.className = "msg";
    ta.value = msg;
    ta.setAttribute("aria-label", "Mensagem para " + (c.nome_completo || c.nome || "cliente"));
    wrap.appendChild(ta);

    /* --- botões --- */
    var actions = document.createElement("div");
    actions.className = "card-actions";

    var btnCopy = document.createElement("button");
    btnCopy.className = "btn btn-copy";
    btnCopy.type = "button";
    btnCopy.innerHTML = "📋 Copiar";
    btnCopy.addEventListener("click", function () { copiar(ta, btnCopy); });

    var btnWa = document.createElement("button");
    btnWa.className = "btn btn-wa";
    btnWa.type = "button";
    btnWa.innerHTML = "💬 Abrir no WhatsApp";
    if (vazio(c.whatsapp)) {
      btnWa.disabled = true;
      btnWa.title = "Cliente sem número de WhatsApp";
    } else {
      btnWa.addEventListener("click", function () { abrirWhatsApp(c.whatsapp, ta.value); });
    }

    actions.appendChild(btnCopy);
    actions.appendChild(btnWa);
    wrap.appendChild(actions);

    /* --- rodapé: toggle "já contatei" (persiste em localStorage) --- */
    var foot = document.createElement("div");
    foot.className = "card-foot";
    var feito = estaContatado(c);
    var btnDone = document.createElement("button");
    btnDone.className = "btn-done" + (feito ? " is-done" : "");
    btnDone.type = "button";
    btnDone.innerHTML = feito ? "✅ Já contatei — desfazer" : "☐ Marcar como contatado";
    if (!chaveCliente(c)) {
      // sem âncora estável (sem whatsapp/email/id): não dá pra persistir com segurança
      btnDone.disabled = true;
      btnDone.title = "Sem WhatsApp/e-mail estável para salvar o estado";
    } else {
      btnDone.addEventListener("click", function () {
        alternarContatado(c);
        render(); // re-renderiza p/ reordenar + atualizar contador
      });
    }
    foot.appendChild(btnDone);
    wrap.appendChild(foot);

    card.appendChild(wrap);
    return card;
  }

  /* ===========================================================================
     AÇÕES: copiar e abrir WhatsApp
     =========================================================================== */
  function copiar(textarea, botao) {
    var texto = textarea.value;
    var done = function () {
      var antes = botao.innerHTML;
      botao.innerHTML = "✅ Copiado!";
      botao.classList.add("ok");
      setTimeout(function () { botao.innerHTML = antes; botao.classList.remove("ok"); }, 1600);
    };
    // tenta a Clipboard API moderna; cai no execCommand p/ file:// antigos
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(texto).then(done, function () { copiarFallback(textarea, done); });
    } else {
      copiarFallback(textarea, done);
    }
  }
  function copiarFallback(textarea, done) {
    textarea.focus();
    textarea.select();
    try { document.execCommand("copy"); } catch (e) {}
    done();
  }
  function abrirWhatsApp(whatsapp, texto) {
    var digits = String(whatsapp || "").replace(/\D/g, "");
    if (!digits) return;
    // usa o texto ATUAL do textarea (pode ter sido editado pelo Jair)
    var url = "https://wa.me/" + digits + "?text=" + encodeURIComponent(texto);
    window.open(url, "_blank", "noopener");
  }

  /* ===========================================================================
     RENDER GERAL + CONTADOR
     =========================================================================== */
  // atualiza o sub-contador "X de N contatados" (+ link de reset)
  function atualizarContadorContatados() {
    if (!el.counterDone) return;
    var total = CLIENTES.length;
    var feitos = totalContatados();
    if (total === 0 || feitos === 0) { el.counterDone.innerHTML = ""; return; }
    el.counterDone.innerHTML =
      '✅ <b>' + feitos + '</b> de <b>' + total + '</b> contatados' +
      '<span class="done-reset" id="done-reset">limpar</span>';
    var reset = document.getElementById("done-reset");
    if (reset) {
      reset.addEventListener("click", function () {
        if (window.confirm("Desmarcar TODOS os " + feitos + " contatados?")) limparContatados();
      });
    }
  }

  function render() {
    el.lista.innerHTML = "";

    var total = CLIENTES.length;

    // estado vazio: nenhum cliente carregado
    if (total === 0) {
      var vazioBox = document.createElement("div");
      vazioBox.className = "empty";
      vazioBox.innerHTML =
        '<div class="ico">📭</div>' +
        '<h2>Nenhum cliente carregado.</h2>' +
        '<p>Rode <code>python scripts/export_anuais_ativos.py</code> para gerar a versão preenchida (ou use <code>--demo</code>).</p>';
      el.lista.appendChild(vazioBox);
      el.counterVis.innerHTML = 'Mostrando <b>0</b> de <b>0</b> clientes';
      atualizarContadorContatados();
      return;
    }

    var visiveis = ordenar(CLIENTES.filter(clienteVisivel));

    // estado vazio por filtro
    if (visiveis.length === 0) {
      var nada = document.createElement("div");
      nada.className = "empty";
      nada.innerHTML =
        '<div class="ico">🔍</div>' +
        '<h2>Nenhum cliente bate com os filtros.</h2>' +
        '<p>Ajuste a busca, os perfis, o objetivo ou desmarque os filtros.</p>';
      el.lista.appendChild(nada);
    } else {
      var frag = document.createDocumentFragment();
      visiveis.forEach(function (c) { frag.appendChild(criarCard(c)); });
      el.lista.appendChild(frag);
    }

    el.counterVis.innerHTML = 'Mostrando <b>' + visiveis.length + '</b> de <b>' + total + '</b> clientes';
    atualizarContadorContatados();
  }

  /* ===========================================================================
     CHIPS DE PERFIL — gera só os perfis que existem nos dados (+ rótulo/cor)
     =========================================================================== */
  function montarChipsPerfil() {
    // ordem canônica do contrato; mantém só os presentes nos dados
    var ordem = ["ativo_fiel","embaixador","ativo_promotor","ativo_silencioso",
                 "ativo_passivo","ativo_recente","ativo_em_risco"];
    var presentes = {};
    CLIENTES.forEach(function (c) { if (c.perfil) presentes[c.perfil] = true; });

    var lista = ordem.filter(function (p) { return presentes[p]; });
    // inclui perfis fora da ordem canônica, se houver
    Object.keys(presentes).forEach(function (p) { if (lista.indexOf(p) === -1) lista.push(p); });

    el.perfis.innerHTML = "";
    if (lista.length === 0) {
      el.perfis.innerHTML = '<span style="color:var(--text-faint);font-size:12.5px">—</span>';
      return;
    }
    lista.forEach(function (p) {
      var pm = perfilMeta(p);
      var chip = document.createElement("label");
      chip.className = "chip";
      chip.style.setProperty("--p-color", pm.cor);
      chip.innerHTML = '<span class="dot"></span>' + escapeHtml(pm.label) +
                       '<input type="checkbox" value="' + escapeHtml(p) + '">';
      var input = chip.querySelector("input");
      input.addEventListener("change", function () {
        if (input.checked) { perfisSelecionados.add(p); chip.classList.add("active"); }
        else { perfisSelecionados.delete(p); chip.classList.remove("active"); }
        render();
      });
      el.perfis.appendChild(chip);
    });
  }

  /* ===========================================================================
     LISTENERS
     =========================================================================== */
  el.objetivo.addEventListener("change", render);
  el.variante.addEventListener("change", render);
  el.ordenar.addEventListener("change", render);
  if (el.objFiltro) el.objFiltro.addEventListener("change", render);
  el.renova30.addEventListener("change", render);
  if (el.ocultarDone) el.ocultarDone.addEventListener("change", render);
  // busca com pequeno debounce p/ não re-renderizar a cada tecla
  var buscaTimer = null;
  el.busca.addEventListener("input", function () {
    clearTimeout(buscaTimer);
    buscaTimer = setTimeout(render, 120);
  });

  /* ===========================================================================
     INIT
     =========================================================================== */
  montarChipsPerfil();
  render();
})();
</script>
</body>
</html>
